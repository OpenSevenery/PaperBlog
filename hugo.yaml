baseURL: "https://blog.opensery.com/"
title: "OpenSevenery"
pagination:
  pagerSize: 5
theme: PaperMod

defaultContentLanguage: zh
defaultContentLanguageInSubdir: true

languages:
  zh:
    weight: 1
    params:
      description: "保持独立思考 - 也许你可以在这里找到一些有用的经验"

      DateFormat: "2006年01月02日"

      profileMode:
        title: "保持独立思考"
        subtitle: "也许你可以在这里找到一些有用的经验"

      homeInfoParams:
        Title: "保持独立思考"
        Content: "也许你可以在这里找到一些有用的经验"

    menu:
      main:
        - identifier: posts
          name: 文章
          url: /posts/
          weight: 10
        - identifier: tags
          name: 标签
          url: /tags/
          weight: 20
        - identifier: search
          name: 搜索
          url: /search/
          weight: 30
        - identifier: about
          name: 关于
          url: /about/
          weight: 40

  en:
    weight: 2
    params:
      description: "Maintain Independent Thinking - Perhaps you can find some useful experience here"

      DateFormat: "January 2, 2006"

      profileMode:
        title: "Maintain Independent Thinking"
        subtitle: "Perhaps you can find some useful experience here"

      homeInfoParams:
        Title: "Maintain Independent Thinking"
        Content: "Perhaps you can find some useful experience here"

    menu:
      main:
        - identifier: posts
          name: Posts
          url: /posts/
          weight: 10
        - identifier: tags
          name: Tags
          url: /tags/
          weight: 20
        - identifier: search
          name: Search
          url: /search/
          weight: 30
        - identifier: about
          name: About
          url: /about/
          weight: 40

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

taxonomies:
  tag: tags

params:
  env: production
  title: "OpenSevenery"
  keywords:
    [
      Blog,
      Portfolio,
      PaperMod,
      OpenSery,
      OpenSevenery,
      Sevenery,
      七尾狐草,
      Maintain Independent Thinking,
      Perhaps you can find some useful experience here,
    ]
  author: "OpenSevenery"
  images: ["./default.png"]
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    # disableHLJS: true
    # disableFingerprinting: true
    favicon: "favicon.ico"
    favicon16x16: "favicon.ico"
    favicon32x32: "favicon.ico"
    apple_touch_icon: "favicon.ico"
    safari_pinned_tab: "favicon.ico"

  label:
    text: "OpenSevenery"
    # icon: /favicon.ico
    # iconHeight: 35

  profileMode:
    enabled: true
    imageUrl: "/default.png"
    imageWidth: 120
    imageHeight: 120
    imageTitle: "OpenSevenery"
    # buttons:
    #   - name: Posts
    #     url: posts
    #   - name: Tags
    #     url: tags

  socialIcons:
    - name: github
      url: "https://github.com/OpenSevenery/"

  analytics:
    google:
      SiteVerificationTag: "XYZabc"
    bing:
      SiteVerificationTag: "XYZabc"
    yandex:
      SiteVerificationTag: "XYZabc"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai

outputs:
  home:
    - HTML
    - RSS
    - JSON
