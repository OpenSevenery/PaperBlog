baseURL: "https://blog.opensery.com/"
pagination:
  pagerSize: 5
theme: PaperMod

defaultContentLanguage: zh
defaultContentLanguageInSubdir: true

languages:
  zh:
    weight: 1
    title: "OpenSevenery"
    params:
      title: "OpenSevenery"
      description: "这里是一名坚持独立思考的非科班独立开发者的探索空间，记录技术、创造与生活中的经验和思考，分享探索过程中的想法与感悟。"

      DateFormat: "2006年01月02日"

      profileMode:
        title: "保持独立思考"
        subtitle: "以独立思考的方式探索技术、创造与生活。"

      homeInfoParams:
        Title: "保持独立思考"
        Content: "以独立思考的方式探索技术、创造与生活。"

    menu:
      main:
        - identifier: posts
          name: 文章
          url: /posts/
          weight: 10
        - identifier: tags
          name: 标签
          url: /tags/
          weight: 20
        - identifier: search
          name: 搜索
          url: /search/
          weight: 30
        - identifier: projects
          name: 项目
          url: /projects/
          weight: 40
        - identifier: about
          name: 关于
          url: /about/
          weight: 50

  en:
    weight: 2
    title: "OpenSevenery"
    params:
      title: "OpenSevenery"
      description: "An exploration space for a self-taught indie developer who values independent thinking, sharing experiences and reflections on technology, creation, and life."

      DateFormat: "January 2, 2006"

      profileMode:
        title: "Think Independently"
        subtitle: "Explore technology, creativity, and life through independent thinking."

      homeInfoParams:
        Title: "Think Independently"
        Content: "Explore technology, creativity, and life through independent thinking."

    menu:
      main:
        - identifier: posts
          name: Posts
          url: /posts/
          weight: 10
        - identifier: tags
          name: Tags
          url: /tags/
          weight: 20
        - identifier: search
          name: Search
          url: /search/
          weight: 30
        - identifier: projects
          name: Projects
          url: /projects/
          weight: 40
        - identifier: about
          name: About
          url: /about/
          weight: 50

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

taxonomies:
  tag: tags

params:
  env: production
  keywords:
    [
      Blog,
      Personal Blog,
      Indie Developer,
      Self-Taught Developer,
      Software Development,
      Product Building,
      Technology Exploration,
      Independent Thinking,
      Think Independently,
      Personal Growth,
      博客,
      个人博客,
      独立开发者,
      非科班开发者,
      软件开发,
      产品实践,
      技术探索,
      独立思考,
      Sevenery,
      OpenSery,
      OpenSevenery,
      七尾狐草,
    ]
  author: "OpenSevenery"
  images: ["./default.png"]
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    # disableHLJS: true
    # disableFingerprinting: true
    favicon: "favicon.ico"
    favicon16x16: "favicon.ico"
    favicon32x32: "favicon.ico"
    apple_touch_icon: "favicon.ico"
    safari_pinned_tab: "favicon.ico"

  label:
    text: "OpenSevenery"
    # icon: /favicon.ico
    # iconHeight: 35

  profileMode:
    enabled: true
    imageUrl: "/default.png"
    imageWidth: 120
    imageHeight: 120
    imageTitle: "OpenSevenery"
    # buttons:
    #   - name: Posts
    #     url: posts
    #   - name: Tags
    #     url: tags

  socialIcons:
    - name: x
      url: "https://x.com/OpenSevenery"
    - name: github
      url: "https://github.com/OpenSevenery"
    - name: reddit
      url: "https://www.reddit.com/user/OpenSevenery/"
    - name: bilibili
      url: "https://space.bilibili.com/12173478"

  analytics:
    google:
      GTag: "G-QTKSB9RHQJ"
      SiteVerificationTag: ""
    bing:
      SiteVerificationTag: ""
    yandex:
      SiteVerificationTag: ""

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai

outputs:
  home:
    - HTML
    - RSS
    - JSON
